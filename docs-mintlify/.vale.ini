StylesPath = .vale/styles
MinAlertLevel = suggestion
IgnoredScopes = tt, img, url, a
SkippedScopes = script, style, pre, figure, code

Vocab = Tracer

[formats]
mdx = md

[*.mdx]
BasedOnStyles = Vale

TokenIgnores = (?m)((?:import|export) .+?$), \
(?)(?!`), \
(<[A-Z]\w+>.+?<\/[A-Z]\w+>), \
(<[^>]*>), \
\{[^}]*\}, \
(`[^`]*`)

BlockIgnores = (?sm)^(<\w+\n .*\s\/>)$, \
(?sm)^({.+.*})$, \
(?sm)^```[\s\S]*?```$

CommentDelimiters = {/*, */}
